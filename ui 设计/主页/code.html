<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Party Game Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#000000",
                    "error-dim": "#9f0519",
                    "primary-container": "#ff6bb9",
                    "primary-fixed": "#ff6bb9",
                    "inverse-surface": "#220214",
                    "on-tertiary-container": "#5f5600",
                    "surface-container-high": "#ffd8e7",
                    "tertiary": "#665c00",
                    "on-secondary-fixed": "#00423c",
                    "on-tertiary-fixed-variant": "#6a6000",
                    "surface-container": "#ffe0ec",
                    "on-error-container": "#570008",
                    "error-container": "#fb5151",
                    "on-error": "#ffefee",
                    "error": "#b31b25",
                    "primary-dim": "#9b0065",
                    "on-tertiary-fixed": "#4b4400",
                    "secondary": "#00675f",
                    "surface-container-highest": "#ffd0e3",
                    "surface-dim": "#ffc4dd",
                    "surface-tint": "#b00074",
                    "outline": "#9b687f",
                    "background": "#fff4f6",
                    "tertiary-dim": "#595000",
                    "inverse-primary": "#fe4ab0",
                    "tertiary-fixed-dim": "#f0dc2b",
                    "on-secondary-container": "#00574f",
                    "on-primary-container": "#4a002e",
                    "outline-variant": "#d69db6",
                    "on-primary": "#ffeff3",
                    "surface-container-low": "#ffecf2",
                    "primary": "#b00074",
                    "primary-fixed-dim": "#fe4ab0",
                    "surface": "#fff4f6",
                    "on-secondary-fixed-variant": "#006159",
                    "on-tertiary": "#fff4b0",
                    "tertiary-fixed": "#ffeb3b",
                    "secondary-container": "#56f1e0",
                    "on-secondary": "#bffff5",
                    "surface-variant": "#ffd0e3",
                    "on-background": "#492136",
                    "secondary-fixed": "#56f1e0",
                    "surface-bright": "#fff4f6",
                    "surface-container-lowest": "#ffffff",
                    "secondary-dim": "#005a52",
                    "inverse-on-surface": "#c58da6",
                    "on-primary-fixed-variant": "#5b003a",
                    "secondary-fixed-dim": "#43e2d2",
                    "on-surface": "#492136",
                    "tertiary-container": "#ffeb3b",
                    "on-surface-variant": "#7c4d64"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Be Vietnam Pro"
                    ],
                    "label": [
                            "Plus Jakarta Sans"
                    ]
            }
    },
        },
      }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-pattern {
            background-color: #fff4f6;
            background-image: radial-gradient(#ffc4dd 2px, transparent 2px);
            background-size: 30px 30px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-pattern text-on-surface min-h-screen flex flex-col overflow-x-hidden relative pb-32">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/80 backdrop-blur-2xl shadow-[0_20px_50px_rgba(255,64,129,0.05)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-pink-600" data-icon="casino" style="font-variation-settings: 'FILL' 1;">casino</span>
<h1 class="text-2xl font-black text-zinc-900 tracking-tighter font-['Plus_Jakarta_Sans']">Playground</h1>
</div>
<button class="scale-95 active:scale-90 transition-transform duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-zinc-400" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12 gap-8 relative z-10">
<!-- Hero Section -->
<div class="text-center mb-4">
<h2 class="text-[3.5rem] leading-none font-black font-headline text-on-background tracking-tight mb-2">Let's Play</h2>
<p class="text-on-surface-variant font-body text-lg">Choose your mode.</p>
</div>
<!-- Buttons Grid -->
<div class="w-full max-w-md flex flex-col gap-6">
<!-- Start Game Button -->
<button class="relative w-full overflow-hidden rounded-[3rem] bg-gradient-to-r from-primary to-primary-container p-1 shadow-[0_20px_60px_rgba(176,0,116,0.15)] transform active:scale-95 transition-transform duration-200 group">
<div class="w-full h-full bg-white/10 backdrop-blur-md rounded-[2.8rem] px-8 py-8 flex items-center justify-between">
<div class="flex flex-col items-start text-on-primary">
<span class="font-headline font-black text-3xl tracking-tight leading-none mb-1">Start Game</span>
<span class="font-body text-sm opacity-80">Jump right in</span>
</div>
<span class="material-symbols-outlined text-5xl text-on-primary drop-shadow-md group-hover:scale-110 transition-transform" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</button>
<!-- Punishment List Button -->
<button class="relative w-full overflow-hidden rounded-[2rem] bg-surface-container-high p-6 flex items-center justify-between shadow-[0_10px_40px_rgba(73,33,54,0.05)] transform active:scale-95 transition-transform duration-200 group translate-x-2">
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-error text-3xl" data-icon="skull" style="font-variation-settings: 'FILL' 1;">skull</span>
</div>
<div class="flex flex-col items-start text-on-surface">
<span class="font-headline font-bold text-xl tracking-tight">Punishment List</span>
<span class="font-body text-sm text-on-surface-variant">View the dares</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Settings Button -->
<button class="relative w-full overflow-hidden rounded-[2rem] bg-surface-container-highest p-6 flex items-center justify-between shadow-[0_10px_40px_rgba(73,33,54,0.05)] transform active:scale-95 transition-transform duration-200 group -translate-x-2">
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface text-3xl" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
</div>
<div class="flex flex-col items-start text-on-surface">
<span class="font-headline font-bold text-xl tracking-tight">Settings</span>
<span class="font-body text-sm text-on-surface-variant">Configure game</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>
<!-- Decorative Floating Elements (Background) -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-30">
<span class="material-symbols-outlined absolute top-32 left-10 text-6xl text-primary transform rotate-12 blur-[2px]" data-icon="sports_esports" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
<span class="material-symbols-outlined absolute bottom-40 right-10 text-8xl text-secondary-container transform -rotate-12 blur-[4px]" data-icon="casino" style="font-variation-settings: 'FILL' 1;">casino</span>
<span class="material-symbols-outlined absolute top-1/2 left-4 text-4xl text-tertiary-container transform rotate-45" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 backdrop-blur-lg shadow-[0_-10px_40px_rgba(0,0,0,0.08)] rounded-t-[3rem]">
<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center bg-pink-500 text-white rounded-full px-6 py-2 scale-110 -translate-y-2 transition-all shadow-lg shadow-pink-500/40 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="videogame_asset" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Home</span>
</button>
<!-- Penalty (Inactive) -->
<button class="flex flex-col items-center justify-center text-zinc-400 px-4 py-2 hover:text-pink-400 transition-colors active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="skull">skull</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Penalty</span>
</button>
<!-- Settings (Inactive) -->
<button class="flex flex-col items-center justify-center text-zinc-400 px-4 py-2 hover:text-pink-400 transition-colors active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Settings</span>
</button>
</nav>
</body></html>
