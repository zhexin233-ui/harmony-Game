<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Theme Selection - Playground</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary-fixed": "#000000",
                      "error-dim": "#9f0519",
                      "primary-container": "#ff6bb9",
                      "primary-fixed": "#ff6bb9",
                      "inverse-surface": "#220214",
                      "on-tertiary-container": "#5f5600",
                      "surface-container-high": "#ffd8e7",
                      "tertiary": "#665c00",
                      "on-secondary-fixed": "#00423c",
                      "on-tertiary-fixed-variant": "#6a6000",
                      "surface-container": "#ffe0ec",
                      "on-error-container": "#570008",
                      "error-container": "#fb5151",
                      "on-error": "#ffefee",
                      "error": "#b31b25",
                      "primary-dim": "#9b0065",
                      "on-tertiary-fixed": "#4b4400",
                      "secondary": "#00675f",
                      "surface-container-highest": "#ffd0e3",
                      "surface-dim": "#ffc4dd",
                      "surface-tint": "#b00074",
                      "outline": "#9b687f",
                      "background": "#fff4f6",
                      "tertiary-dim": "#595000",
                      "inverse-primary": "#fe4ab0",
                      "tertiary-fixed-dim": "#f0dc2b",
                      "on-secondary-container": "#00574f",
                      "on-primary-container": "#4a002e",
                      "outline-variant": "#d69db6",
                      "on-primary": "#ffeff3",
                      "surface-container-low": "#ffecf2",
                      "primary": "#b00074",
                      "primary-fixed-dim": "#fe4ab0",
                      "surface": "#fff4f6",
                      "on-secondary-fixed-variant": "#006159",
                      "on-tertiary": "#fff4b0",
                      "tertiary-fixed": "#ffeb3b",
                      "secondary-container": "#56f1e0",
                      "on-secondary": "#bffff5",
                      "surface-variant": "#ffd0e3",
                      "on-background": "#492136",
                      "secondary-fixed": "#56f1e0",
                      "surface-bright": "#fff4f6",
                      "surface-container-lowest": "#ffffff",
                      "secondary-dim": "#005a52",
                      "inverse-on-surface": "#c58da6",
                      "on-primary-fixed-variant": "#5b003a",
                      "secondary-fixed-dim": "#43e2d2",
                      "on-surface": "#492136",
                      "tertiary-container": "#ffeb3b",
                      "on-surface-variant": "#7c4d64"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Be Vietnam Pro"
                      ],
                      "label": [
                              "Plus Jakarta Sans"
                      ]
              }
      },
          },
        }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-label { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-24 overflow-x-hidden flex flex-col items-center">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-2xl no-border bg-surface-container-low shadow-[0_20px_50px_rgba(255,64,129,0.05)] docked full-width top-0">
<button class="text-zinc-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-2xl font-black text-zinc-900 dark:text-white tracking-tighter font-['Plus_Jakarta_Sans'] tracking-tighter font-bold">Playground</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-lg px-6 pt-12 pb-24 flex flex-col gap-10">
<!-- Hero Section -->
<section class="flex flex-col gap-2 items-center text-center">
<h2 class="font-headline text-5xl font-black tracking-tighter text-primary">Pick Your Style</h2>
<p class="font-body text-on-surface-variant text-lg">Select a theme for your next party game. You can change this later in settings.</p>
</section>
<!-- Theme Selection Grid -->
<section class="flex flex-col gap-8 w-full">
<!-- Q-Version Cartoon Card -->
<button class="group relative w-full aspect-[4/3] rounded-xl overflow-hidden bg-surface-container-highest shadow-[0_20px_50px_rgba(255,107,185,0.15)] flex flex-col items-center justify-center p-6 scale-95 active:scale-90 transition-transform duration-200">
<!-- Background Image overlay for texture -->
<div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&amp;fit=crop&amp;q=80&amp;w=800')] bg-cover bg-center opacity-10 mix-blend-overlay" data-alt="soft pastel gradient background with rounded shapes and floating clouds"></div>
<!-- Content -->
<div class="relative z-10 flex flex-col items-center gap-4 text-center">
<div class="w-24 h-24 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-lg mb-2 group-hover:-translate-y-2 transition-transform">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">toys</span>
</div>
<h3 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight">Q-Version</h3>
<p class="font-body text-sm text-on-surface-variant font-medium">Soft, cute, and delightfully bubbly.</p>
</div>
<!-- Selection indicator (hidden by default) -->
<div class="absolute top-4 right-4 w-8 h-8 rounded-full bg-surface-container flex items-center justify-center border-2 border-primary-container/30">
<span class="material-symbols-outlined text-primary-container text-sm" style="font-variation-settings: 'FILL' 0;">circle</span>
</div>
</button>
<!-- Neon Video Game Card -->
<button class="group relative w-full aspect-[4/3] rounded-DEFAULT overflow-hidden bg-inverse-surface shadow-[0_20px_60px_rgba(86,241,224,0.1)] flex flex-col items-center justify-center p-6 scale-95 active:scale-90 transition-transform duration-200 border-2 border-transparent hover:border-secondary-container transition-colors">
<!-- Background Image overlay for texture -->
<div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&amp;fit=crop&amp;q=80&amp;w=800')] bg-cover bg-center opacity-20 mix-blend-screen" data-alt="dark background with glowing neon pink and cyan grid lines in a retro synthwave style"></div>
<!-- Content -->
<div class="relative z-10 flex flex-col items-center gap-4 text-center">
<div class="w-24 h-24 rounded-DEFAULT bg-secondary-container/20 text-secondary-container flex items-center justify-center shadow-[0_0_30px_rgba(86,241,224,0.3)] mb-2 group-hover:scale-110 transition-transform backdrop-blur-md">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<h3 class="font-headline text-3xl font-black text-white tracking-tight drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">Neon Arcade</h3>
<p class="font-body text-sm text-surface-dim font-medium">High octane, glow, and dark mode.</p>
</div>
<!-- Selection indicator (hidden by default) -->
<div class="absolute top-4 right-4 w-8 h-8 rounded-full bg-inverse-surface flex items-center justify-center border-2 border-secondary-container">
<span class="material-symbols-outlined text-secondary-container text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</section>
<!-- Action Button -->
<div class="fixed bottom-28 w-full max-w-lg px-6 left-1/2 -translate-x-1/2 z-40">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg py-5 rounded-xl shadow-[0_15px_30px_rgba(176,0,116,0.25)] hover:scale-[0.98] active:scale-[0.95] transition-all flex items-center justify-center gap-2">
                Let's Play
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-lg tonal-shift-no-border shadow-[0_-10px_40px_rgba(0,0,0,0.08)] fixed bottom-0 w-full rounded-t-[3rem]">
<button class="flex flex-col items-center justify-center text-zinc-400 px-4 py-2 hover:text-pink-400 transition-colors active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">videogame_asset</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 px-4 py-2 hover:text-pink-400 transition-colors active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">skull</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Penalty</span>
</button>
<!-- Active Navigation Logic: The primary intent is to change a setting (Theme Selection) -->
<button class="flex flex-col items-center justify-center bg-pink-500 text-white rounded-full px-6 py-2 scale-110 -translate-y-2 transition-all shadow-lg shadow-pink-500/40 hover:text-pink-400 transition-colors active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-[11px] uppercase tracking-widest">Settings</span>
</button>
</nav>
</body></html>
