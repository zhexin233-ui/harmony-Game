<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-2xl shadow-[0_20px_50px_rgba(255,64,129,0.05)] no-border bg-surface-container-low docked full-width top-0">
<button class="scale-95 active:scale-90 transition-transform duration-200 text-pink-600 dark:text-pink-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-tighter font-bold text-xl text-zinc-900 dark:text-white">Playground</h1>
<div class="w-8"></div> <!-- Spacer to center the headline properly -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-md px-6 py-12 gap-12 z-10 relative">
<!-- Decorative Background Elements for Kinetic Playground Vibe -->
<div class="absolute top-1/4 left-0 w-64 h-64 bg-primary-container rounded-full mix-blend-multiply filter blur-[80px] opacity-40 animate-blob"></div>
<div class="absolute top-1/3 right-0 w-72 h-72 bg-secondary-container rounded-full mix-blend-multiply filter blur-[80px] opacity-40 animate-blob animation-delay-2000"></div>
<!-- Title -->
<div class="text-center space-y-2 z-10">
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">How many players?</h2>
<p class="text-on-surface-variant font-medium text-lg">Gather your crew.</p>
</div>
<!-- Player Count Selector Area -->
<div class="flex flex-col items-center justify-center w-full z-10 gap-8 bg-surface-container-low p-10 rounded-xl shadow-[0_40px_60px_rgba(73,33,54,0.06)] relative">
<div class="flex items-center justify-between w-full">
<!-- Minus Button -->
<button class="w-16 h-16 rounded-full bg-surface-container-highest shadow-[0_10px_20px_rgba(73,33,54,0.08)] flex items-center justify-center text-on-surface active:scale-90 transition-transform duration-200 hover:bg-surface-dim">
<span class="material-symbols-outlined text-3xl font-bold">remove</span>
</button>
<!-- Number Display -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Glow behind number -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-xl"></div>
<span class="font-headline text-7xl font-black text-primary drop-shadow-md z-10 tabular-nums">4</span>
</div>
<!-- Plus Button -->
<button class="w-16 h-16 rounded-full bg-primary shadow-[0_10px_30px_rgba(176,0,116,0.3)] flex items-center justify-center text-on-primary active:scale-90 transition-transform duration-200 hover:bg-primary-dim">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
</div>
<!-- Helpful text indicating range -->
<div class="text-on-surface-variant/70 text-sm font-bold uppercase tracking-widest bg-surface-container py-2 px-4 rounded-full">
                2 - 8 Players
            </div>
</div>
<!-- Action Button -->
<button class="w-full py-5 rounded-lg bg-gradient-to-r from-primary to-primary-container shadow-[0_20px_40px_rgba(176,0,116,0.2)] flex items-center justify-center gap-3 text-on-primary font-headline font-bold text-xl active:scale-[0.98] transition-transform duration-200 relative overflow-hidden group z-10 mt-8">
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500 ease-in-out"></div>
<span>Let's Play</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</main>
<!-- BottomNavBar (Suppressed as per rules for linear flow/setup screens, but included structure if needed based on the prompt's implied global context. Decided to omit to focus on the canvas as per "Linear/Transactional" rule) -->
<!-- Removed Bottom Nav to keep focus on the selection task -->
